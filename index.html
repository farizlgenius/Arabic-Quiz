<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arabic Quiz App (26-50)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fcf8f2;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-content: center;
            min-height: 100vh;
        }
        .quiz-container {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            max-width: 500px;
            width: 100%;
            text-align: center;
            margin: auto;
        }
        h2 { color: #2c3e50; margin-bottom: 5px; font-size: 22px; }
        .progress { color: #7f8c8d; font-size: 14px; margin-bottom: 25px; }
        .question-box {
            background-color: #fdfaf6;
            padding: 25px;
            border-radius: 10px;
            margin-bottom: 20px;
            border-left: 5px solid #d35400;
        }
        .type-label { font-size: 14px; color: #e67e22; font-weight: bold; text-transform: uppercase; }
        .word { font-size: 36px; font-weight: bold; margin: 15px 0; color: #2c3e50; direction: rtl; }
        .input-answer {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 2px solid #bdc3c7;
            border-radius: 8px;
            box-sizing: border-box;
            margin-bottom: 15px;
            text-align: center;
        }
        .btn {
            background-color: #e67e22;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: background 0.2s;
        }
        .btn:hover { background-color: #d35400; }
        .btn-secondary { background-color: #3498db; margin-top: 10px; }
        .btn-secondary:hover { background-color: #2980b9; }
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
            display: none;
        }
        .correct { background-color: #d4edda; color: #155724; }
        .wrong { background-color: #f8d7da; color: #721c24; }
        .score-view { font-size: 24px; color: #2c3e50; font-weight: bold; }
    </style>
</head>
<body>

<div class="quiz-container">
    <h2>Arabic Quiz (คำที่ 26-50)</h2>
    <div class="progress" id="progress">ข้อที่ 1/10</div>

    <div id="quiz-box">
        <div class="question-box">
            <div class="type-label" id="direction-label">แปลเป็นภาษาไทย</div>
            <div class="word" id="question-word">فَتَحَ</div>
        </div>
        <input type="text" id="user-answer" class="input-answer" placeholder="พิมพ์คำตอบที่นี่ (หรือกดตรวจเพื่อดูเฉลย)" autocomplete="off">
        <button class="btn" id="action-btn" onclick="checkAnswer()">ตรวจคำตอบ</button>
        <div class="result" id="result-box"></div>
    </div>

    <div id="score-box" style="display: none;">
        <p class="score-view" id="final-score">คุณได้คะแนน 0/10</p>
        <button class="btn btn-secondary" onclick="restartQuiz()">เริ่มเล่นใหม่</button>
    </div>
</div>

<script>
    // ข้อมูลคำศัพท์ลำดับที่ 26-50 จากรูปภาพจริงที่ส่งมาล่าสุด
    const vocabData = [
        { id: 26, ar: "فَتَحَ", th: "เปิด" },
        { id: 27, ar: "غَلَقَ", th: "ปิด" },
        { id: 28, ar: "لَبِسَ", th: "สวมใส่" },
        { id: 29, ar: "خَلَعَ", th: "ถอด" },
        { id: 30, ar: "رَفَعَ", th: "ยก" },
        { id: 31, ar: "وَضَعَ", th: "วาง" },
        { id: 32, ar: "سَمِعَ", th: "ได้ยิน" },
        { id: 33, ar: "فَعَلَ", th: "กระทำ" },
        { id: 34, ar: "عَمِلَ", th: "ทำงาน" },
        { id: 35, ar: "جَعَلَ", th: "ทำ, เริ่ม" },
        { id: 36, ar: "جَمَعَ", th: "รวบรวม" },
        { id: 37, ar: "سَأَلَ", th: "ขอ, ถาม" },
        { id: 38, ar: "حَكَمَ", th: "ตัดสิน" },
        { id: 39, ar: "مَنَحَ", th: "ให้" },
        { id: 40, ar: "وَهَبَ", th: "ให้" },
        { id: 41, ar: "قَبِلَ", th: "รับ" },
        { id: 42, ar: "أَخَذَ", th: "เอา" },
        { id: 43, ar: "نَظَرَ", th: "มองดู" },
        { id: 44, ar: "عَقَلَ", th: "ใช้ปัญญา" },
        { id: 45, ar: "بَصَرَ", th: "มองเห็น, รับรู้" },
        { id: 46, ar: "رَأَى", th: "เห็น" },
        { id: 47, ar: "قَرَأَ", th: "อ่าน" },
        { id: 48, ar: "كَتَبَ", th: "เขียน" },
        { id: 49, ar: "مَحَا", th: "ลบ" },
        { id: 50, ar: "مَسَحَ", th: "ลบ, ลูบ" }
    ];

    let currentQuestions = [];
    let currentIndex = 0;
    let score = 0;
    let isShowingAnswer = false;
    const totalQuestions = 10; // สุ่มมาเล่นทีละ 10 ข้อต่อรอบ

    function startQuiz() {
        let shuffled = [...vocabData].sort(() => 0.5 - Math.random());
        currentQuestions = shuffled.slice(0, totalQuestions).map(item => {
            let isArToTh = Math.random() > 0.5; // สุ่มรูปแบบคำถาม (อาหรับ->ไทย หรือ ไทย->อาหรับ)
            return {
                word: isArToTh ? item.ar : item.th,
                correctAnswer: isArToTh ? item.th : item.ar,
                type: isArToTh ? "แปลเป็นภาษาไทย" : "แปลเป็นภาษาอาหรับ (กริยาอดีต)"
            };
        });
        currentIndex = 0;
        score = 0;
        isShowingAnswer = false;
        showQuestion();
    }

    function showQuestion() {
        if (currentIndex < totalQuestions) {
            document.getElementById("quiz-box").style.display = "block";
            document.getElementById("score-box").style.display = "none";
            document.getElementById("progress").innerText = `ข้อที่ ${currentIndex + 1}/${totalQuestions}`;
            
            let q = currentQuestions[currentIndex];
            document.getElementById("direction-label").innerText = q.type;
            document.getElementById("question-word").innerText = q.word;
            document.getElementById("user-answer").value = "";
            document.getElementById("result-box").style.display = "none";
            document.getElementById("action-btn").innerText = "ตรวจคำตอบ";
            isShowingAnswer = false;
        } else {
            document.getElementById("quiz-box").style.display = "none";
            document.getElementById("score-box").style.display = "block";
            document.getElementById("progress").innerText = "ทำแบบทดสอบเซ็ตนี้เสร็จแล้ว!";
            document.getElementById("final-score").innerText = `คุณได้คะแนน ${score}/${totalQuestions}`;
        }
    }

    function checkAnswer() {
        let q = currentQuestions[currentIndex];
        let resultBox = document.getElementById("result-box");
        let actionBtn = document.getElementById("action-btn");
        let userAns = document.getElementById("user-answer").value.trim();

        if (!isShowingAnswer) {
            // ระบบช่วยตรวจความถูกค้องขั้นพื้นฐาน
            let isCorrect = userAns === q.correctAnswer || q.correctAnswer.includes(userAns) && userAns !== "";
            
            if (isCorrect) {
                resultBox.className = "result correct";
                resultBox.innerHTML = `ถูกต้องเก่งมาก! 🎉 <br>คำตอบคือ: ${q.correctAnswer}`;
                score++;
            } else {
                resultBox.className = "result wrong";
                resultBox.innerHTML = `ยังไม่ถูกน้า ไม่เป็นไรท่องใหม่ข้อหน้า! <br>เฉลยคำตอบคือ: <strong>${q.correctAnswer}</strong>`;
            }
            resultBox.style.display = "block";
            actionBtn.innerText = "ทำข้อถัดไป ->";
            isShowingAnswer = true;
        } else {
            currentIndex++;
            showQuestion();
        }
    }

    function restartQuiz() {
        startQuiz();
    }

    // รองรับการกด Enter เพื่อตรวจคำตอบ
    document.getElementById("user-answer").addEventListener("keyup", function(event) {
        if (event.key === "Enter") {
            checkAnswer();
        }
    });

    startQuiz();
</script>

</body>
</html>
