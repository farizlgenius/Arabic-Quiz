<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arabic Quiz App (1-25)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-content: center;
            min-height: 100vh;
        }
        .quiz-container {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
            text-align: center;
            margin: auto;
        }
        h2 { color: #2c3e50; margin-bottom: 5px; }
        .progress { color: #7f8c8d; font-size: 14px; margin-bottom: 25px; }
        .question-box {
            background-color: #f8f9fa;
            padding: 25px;
            border-radius: 10px;
            margin-bottom: 20px;
            border-left: 5px solid #3498db;
        }
        .type-label { font-size: 14px; color: #3498db; font-weight: bold; text-transform: uppercase; }
        .word { font-size: 32px; font-weight: bold; margin: 15px 0; color: #2c3e50; direction: rtl; }
        .input-answer {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 2px solid #bdc3c7;
            border-radius: 8px;
            box-sizing: border-box;
            margin-bottom: 15px;
            text-align: center;
        }
        .btn {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: background 0.2s;
        }
        .btn:hover { background-color: #27ae60; }
        .btn-secondary { background-color: #3498db; margin-top: 10px; }
        .btn-secondary:hover { background-color: #2980b9; }
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
            display: none;
        }
        .correct { background-color: #d4edda; color: #155724; }
        .wrong { background-color: #f8d7da; color: #721c24; }
        .score-view { font-size: 24px; color: #2c3e50; font-weight: bold; }
    </style>
</head>
<body>

<div class="quiz-container">
    <h2>Arabic Quiz (คำที่ 1-25)</h2>
    <div class="progress" id="progress">ข้อที่ 1/10</div>

    <div id="quiz-box">
        <div class="question-box">
            <div class="type-label" id="direction-label">แปลเป็นภาษาไทย</div>
            <div class="word" id="question-word">نَامَ</div>
        </div>
        <input type="text" id="user-answer" class="input-answer" placeholder="พิมพ์คำตอบที่นี่ (หรือกดตรวจเพื่อดูเฉลย)" autocomplete="off">
        <button class="btn" id="action-btn" onclick="checkAnswer()">ตรวจคำตอบ</button>
        <div class="result" id="result-box"></div>
    </div>

    <div id="score-box" style="display: none;">
        <p class="score-view" id="final-score">คุณได้คะแนน 0/10</p>
        <button class="btn btn-secondary" onclick="restartQuiz()">เริ่มเล่นใหม่</button>
    </div>
</div>

<script>
    // ข้อมูลคำศัพท์ลำดับที่ 1-25 จาก image.png และ image_2.png
    const vocabData = [
        { id: 1, ar: "نَامَ", th: "นอนหลับ" },
        { id: 2, ar: "غَسَلَ", th: "ล้าง" },
        { id: 3, ar: "بَالَ", th: "ปัสสาวะ" },
        { id: 4, ar: "كَانَ", th: "เป็น, คือ" },
        { id: 5, ar: "صَارَ", th: "กลายเป็น" },
        { id: 6, ar: "أَكَلَ", th: "กิน" },
        { id: 7, ar: "شَرِبَ", th: "ดื่ม" },
        { id: 8, ar: "بَلَعَ", th: "กลืน" },
        { id: 9, ar: "شَمَّ", th: "ดม" },
        { id: 10, ar: "سَاقَ", th: "ขับขยานพาหนะ" },
        { id: 11, ar: "رَكِبَ", th: "โดยสาร" },
        { id: 12, ar: "وَقَفَ", th: "หยุด, ยืน" },
        { id: 13, ar: "قَامَ", th: "ลุกยืน" },
        { id: 14, ar: "جَلَسَ", th: "นั่ง" },
        { id: 15, ar: "سَارَ", th: "เดิน, เล่น" },
        { id: 16, ar: "مَشَى", th: "เดิน" },
        { id: 17, ar: "جَرَى", th: "วิ่ง" },
        { id: 18, ar: "سَالَ", th: "ไหล, ทะลัก" },
        { id: 19, ar: "سَبَحَ", th: "ว่ายน้ำ" },
        { id: 20, ar: "ذَهَبَ", th: "ไป" },
        { id: 21, ar: "حَضَرَ", th: "มา" },
        { id: 22, ar: "رَجَعَ", th: "กลับ" },
        { id: 23, ar: "صَعِدَ", th: "ขึ้น" },
        { id: 24, ar: "نَزَلَ", th: "ลง" },
        { id: 25, ar: "سَقَتَ", th: "ตก" }
    ];

    let currentQuestions = [];
    let currentIndex = 0;
    let score = 0;
    let isShowingAnswer = false;
    const totalQuestions = 10; // กำหนดจำนวนข้อต่อรอบ

    function startQuiz() {
        // สุ่มเลือกคำศัพท์มาสลับกันและสร้างโจทย์แบบผสม ไทย-อาหรับ
        let shuffled = [...vocabData].sort(() => 0.5 - Math.random());
        currentQuestions = shuffled.slice(0, totalQuestions).map(item => {
            let isArToTh = Math.random() > 0.5; // สุ่มว่าจะถามอาหรับแปลไทย หรือไทยแปลอาหรับ
            return {
                word: isArToTh ? item.ar : item.th,
                correctAnswer: isArToTh ? item.th : item.ar,
                type: isArToTh ? "แปลเป็นภาษาไทย" : "แปลเป็นภาษาอาหรับ (กริยาอดีต)"
            };
        });
        currentIndex = 0;
        score = 0;
        isShowingAnswer = false;
        showQuestion();
    }

    function showQuestion() {
        if (currentIndex < totalQuestions) {
            document.getElementById("quiz-box").style.display = "block";
            document.getElementById("score-box").style.display = "none";
            document.getElementById("progress").innerText = `ข้อที่ ${currentIndex + 1}/${totalQuestions}`;
            
            let q = currentQuestions[currentIndex];
            document.getElementById("direction-label").innerText = q.type;
            document.getElementById("question-word").innerText = q.word;
            document.getElementById("user-answer").value = "";
            document.getElementById("result-box").style.display = "none";
            document.getElementById("action-btn").innerText = "ตรวจคำตอบ";
            isShowingAnswer = false;
        } else {
            // จบควิซ แสดงคะแนน
            document.getElementById("quiz-box").style.display = "none";
            document.getElementById("score-box").style.display = "block";
            document.getElementById("progress").innerText = "ทำแบบทดสอบเสร็จแล้ว!";
            document.getElementById("final-score").innerText = `คุณได้คะแนน ${score}/${totalQuestions}`;
        }
    }

    function checkAnswer() {
        let q = currentQuestions[currentIndex];
        let resultBox = document.getElementById("result-box");
        let actionBtn = document.getElementById("action-btn");
        let userAns = document.getElementById("user-answer").value.trim();

        if (!isShowingAnswer) {
            // ตรวจสอบความถูกต้อง (ตัดช่องว่างออกเพื่อให้ตรวจง่ายขึ้น)
            let isCorrect = userAns === q.correctAnswer || q.correctAnswer.includes(userAns) && userAns !== "";
            
            if (isCorrect) {
                resultBox.className = "result correct";
                resultBox.innerHTML = `ถูกต้อง! 🎉 <br>คำตอบคือ: ${q.correctAnswer}`;
                score++;
            } else {
                resultBox.className = "result wrong";
                resultBox.innerHTML = `ผิดน้า ไม่เป็นไรเก็บใหม่ข้อหน้า! <br>คำตอบที่ถูกคือ: <strong>${q.correctAnswer}</strong>`;
            }
            resultBox.style.display = "block";
            actionBtn.innerText = "ข้อถัดไป ->";
            isShowingAnswer = true;
        } else {
            currentIndex++;
            showQuestion();
        }
    }

    function restartQuiz() {
        startQuiz();
    }

    // กด Enter เพื่อส่งคำตอบได้
    document.getElementById("user-answer").addEventListener("keyup", function(event) {
        if (event.key === "Enter") {
            checkAnswer();
        }
    });

    // เริ่มต้นแอปพลิเคชัน
    startQuiz();
</script>

</body>
</html>
