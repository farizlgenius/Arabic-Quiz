<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arabic Quiz App (51-100) Custom Range</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-content: center;
            min-height: 100vh;
        }
        .quiz-container {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 550px;
            width: 100%;
            text-align: center;
            margin: auto;
        }
        h2 { color: #2c3e50; margin-bottom: 5px; font-size: 24px; }
        .progress { color: #7f8c8d; font-size: 14px; margin-bottom: 25px; }
        
        /* สไตล์สำหรับส่วนการเลือกช่วงคำศัพท์ */
        .setup-box {
            margin: 20px 0;
            padding: 20px;
            background-color: #f9f9f9;
            border-radius: 10px;
            border: 1px solid #e0e0e0;
        }
        .form-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .form-group label {
            font-weight: bold;
            color: #34495e;
        }
        .form-group select {
            padding: 8px 15px;
            font-size: 16px;
            border-radius: 6px;
            border: 2px solid #bdc3c7;
            width: 60%;
            background-color: white;
        }

        .question-box {
            background-color: #fdfaf6;
            padding: 25px;
            border-radius: 10px;
            margin-bottom: 20px;
            border-left: 5px solid #9b59b6;
        }
        .type-label { font-size: 14px; color: #8e44ad; font-weight: bold; text-transform: uppercase; margin-bottom: 10px; }
        .word { font-size: 36px; font-weight: bold; margin: 15px 0; color: #2c3e50; direction: rtl; }
        
        .verb-table {
            width: 100%;
            margin: 15px 0;
            border-collapse: collapse;
            direction: rtl;
        }
        .verb-table th, .verb-table td {
            border: 1px solid #e0e0e0;
            padding: 10px;
            text-align: center;
            font-size: 20px;
        }
        .verb-table th {
            background-color: #f1f2f6;
            font-size: 14px;
            color: #57606f;
            font-weight: bold;
        }
        .th-label {
            font-size: 12px;
            color: #7f8c8d;
            display: block;
            margin-top: 2px;
        }

        .input-answer {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 2px solid #bdc3c7;
            border-radius: 8px;
            box-sizing: border-box;
            margin-bottom: 15px;
            text-align: center;
        }
        .btn {
            background-color: #9b59b6;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: background 0.2s;
        }
        .btn:hover { background-color: #8e44ad; }
        .btn-secondary { background-color: #3498db; margin-top: 10px; }
        .btn-secondary:hover { background-color: #2980b9; }
        .result {
            margin-top: 20px;
            padding: 20px;
            border-radius: 8px;
            font-weight: bold;
            display: none;
            text-align: center;
        }
        .correct { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .wrong { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .score-view { font-size: 26px; color: #2c3e50; font-weight: bold; }
    </style>
</head>
<body>

<div class="quiz-container">
    <h2>Arabic Quiz App</h2>
    <div class="progress" id="progress">ตั้งค่าระบบควิซของคุณ</div>

    <div id="setup-box" class="setup-box">
        <div class="form-group">
            <label for="start-word">เริ่มจากคำที่:</label>
            <select id="start-word" onchange="updateEndWordOptions()"></select>
        </div>
        <div class="form-group">
            <label for="end-word">ถึงคำที่:</label>
            <select id="end-word"></select>
        </div>
        <button class="btn" onclick="startQuiz()">เริ่มทำควิซ</button>
    </div>

    <div id="quiz-box" style="display: none;">
        <div class="question-box">
            <div class="type-label" id="direction-label">แปลเป็นภาษาไทย</div>
            <div id="question-display"></div>
        </div>
        <input type="text" id="user-answer" class="input-answer" placeholder="พิมพ์คำตอบที่นี่ แล้วกด Enter" autocomplete="off">
        <button class="btn" id="action-btn" onclick="checkAnswer()">ตรวจคำตอบ</button>
        <div class="result" id="result-box"></div>
    </div>

    <div id="score-box" style="display: none;">
        <p class="score-view" id="final-score">คุณได้คะแนน 0/25</p>
        <button class="btn btn-secondary" onclick="backToSetup()">กลับไปหน้าตั้งค่าเลือกช่วงคำ</button>
    </div>
</div>

    let currentQuestions = [];
    let currentIndex = 0;
    let score = 0;
    let isShowingAnswer = false;
    let totalQuestions = 0; 

    // ฟังก์ชันสร้างตัวเลือกคำศัพท์ใน Dropdown
    function initSetupOptions() {
        const startSelect = document.getElementById("start-word");
        startSelect.innerHTML = "";
        
        vocabData.forEach(item => {
            let opt = document.createElement("option");
            opt.value = item.id;
            opt.innerText = `คำที่ ${item.id} (${item.th.split(',')[0]})`;
            startSelect.appendChild(opt);
        });
        
        // กำหนดค่าเริ่มต้นให้กับกล่องเลือกตัวเลือกสุดท้าย
        updateEndWordOptions();
        
        // เลือกค่าสิ้นสุดเป็นคำสุดท้ายของข้อมูล (คำที่ 100) ไว้เป็น Default
        document.getElementById("end-word").value = vocabData[vocabData.length - 1].id;
    }

    // ฟังก์ชันอัปเดตคำจบ ไม่ให้มี ID น้อยกว่าคำเริ่มต้น
    function updateEndWordOptions() {
        const startValue = parseInt(document.getElementById("start-word").value);
        const endSelect = document.getElementById("end-word");
        const previousEndValue = parseInt(endSelect.value);
        
        endSelect.innerHTML = "";
        
        vocabData.forEach(item => {
            if (item.id >= startValue) {
                let opt = document.createElement("option");
                opt.value = item.id;
                opt.innerText = `คำที่ ${item.id} (${item.th.split(',')[0]})`;
                endSelect.appendChild(opt);
            }
        });

        // พยายามคงค่าเดิมที่เคยเลือกไว้ ถ้าค่าเดิมยังถูกต้องอยู่
        if (previousEndValue && previousEndValue >= startValue) {
            endSelect.value = previousEndValue;
        }
    }

    function startQuiz() { 
        const startId = parseInt(document.getElementById("start-word").value);
        const endId = parseInt(document.getElementById("end-word").value);

        // กรองคำศัพท์เฉพาะช่วงที่เลือก (รองรับขอบเขตสูงสุดถึงข้อ 100)
        let selectedWords = vocabData.filter(item => item.id >= startId && item.id <= endId);
        
        // อัปเดตจำนวนข้อควิซตามช่วงที่เลือกจริง
        totalQuestions = selectedWords.length;

        // สับเปลี่ยนลำดับ (Shuffle)
        let shuffled = [...selectedWords].sort(() => 0.5 - Math.random()); 
        currentQuestions = shuffled.map(item => { 
            let isArToTh = Math.random() > 0.5; 
            return { 
                rawData: item, 
                isArToTh: isArToTh, 
                type: isArToTh ? 
                    "แปลกลุ่มคำอาหรับนี้เป็นภาษาไทย" 
                    : "พิมพ์คำกริยาช่องอดีต (ช่องที่ 1) ให้ตรงกับความหมาย" 
            }; 
        }); 
        
        currentIndex = 0; 
        score = 0; 
        isShowingAnswer = false; 

        // สลับซ่อนหน้าการตั้งค่า แล้วแสดงหน้าทำข้อสอบ
        document.getElementById("setup-box").style.display = "none";
        document.getElementById("quiz-box").style.display = "block";
        document.getElementById("score-box").style.display = "none";

        showQuestion(); 
    }

    function generateArabicTableHTML(past, present, masdar) {
        return `
            <table class="verb-table">
                <thead>
                    <tr>
                        <th>อดีต <span class="th-label">(مَاضٍ)</span></th>
                        <th>ปัจจุบัน <span class="th-label">(مُضَارِع)</span></th>
                        <th>อาการนาม <span class="th-label">(مَصْدَر)</span></th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>${past}</td>
                        <td>${present}</td>
                        <td>${masdar}</td>
                    </tr>
                </tbody>
            </table>
        `;
    }

    function showQuestion() {
        if (currentIndex < totalQuestions) {
            document.getElementById("progress").innerText = `ข้อที่ ${currentIndex + 1}/${totalQuestions}`;
            
            let q = currentQuestions[currentIndex];
            document.getElementById("direction-label").innerText = q.type;
            
            let displayBox = document.getElementById("question-display");
            if (q.isArToTh) {
                displayBox.innerHTML = generateArabicTableHTML(q.rawData.past, q.rawData.present, q.rawData.masdar);
            } else {
                displayBox.innerHTML = `<div class="word" style="direction: ltr;">"${q.rawData.th}"</div>`;
            }

            document.getElementById("user-answer").value = "";
            document.getElementById("user-answer").disabled = false;
            document.getElementById("result-box").style.display = "none";
            document.getElementById("action-btn").innerText = "ตรวจคำตอบ";
            document.getElementById("user-answer").focus();
            isShowingAnswer = false;
        } else {
            document.getElementById("quiz-box").style.display = "none";
            document.getElementById("score-box").style.display = "block";
            document.getElementById("progress").innerText = "จบชุดควิซเรียบร้อยแล้ว!";
            document.getElementById("final-score").innerText = `คุณทำคะแนนได้ทั้งหมด ${score}/${totalQuestions}`;
        }
    }

    function checkAnswer() {
        let q = currentQuestions[currentIndex];
        let resultBox = document.getElementById("result-box");
        let actionBtn = document.getElementById("action-btn");
        let userAns = document.getElementById("user-answer").value.trim();

        if (!isShowingAnswer) {
            let isCorrect = false;
            let targetAnswer = "";

            if (q.isArToTh) {
                targetAnswer = q.rawData.th;
                isCorrect = targetAnswer.includes(userAns) && userAns !== "";
            } else {
                targetAnswer = q.rawData.past;
                let cleanUserAns = userAns.replace(/[\u064B-\u0652]/g, "");
                let cleanTarget = targetAnswer.replace(/[\u064B-\u0652]/g, "");
                isCorrect = (cleanUserAns === cleanTarget && userAns !== "");
            }
            
            if (isCorrect) {
                resultBox.className = "result correct";
                resultBox.innerHTML = `🎉 ถูกต้องแม่นยำ!`;
                score++;
            } else {
                resultBox.className = "result wrong";
                resultBox.innerHTML = `สู้ ๆ ท่องบ่อย ๆ เดี่ยวก็จำได้ครับ!`;
            }

            resultBox.innerHTML += `
                <div style="margin-top: 15px; text-align: left; direction: ltr; font-size:15px; line-height:1.6;">
                    <strong>ความหมายภาษาไทย:</strong> ${q.rawData.th}<br>
                    <strong>เฉลยและตารางคำศัพท์:</strong>
                </div>
                ${generateArabicTableHTML(q.rawData.past, q.rawData.present, q.rawData.masdar)}
            `;

            resultBox.style.display = "block";
            document.getElementById("user-answer").disabled = true;
            actionBtn.innerText = "ทำข้อถัดไป ->";
            actionBtn.focus();
            isShowingAnswer = true;
        } else {
            currentIndex++;
            showQuestion();
        }
    }

    function backToSetup() {
        document.getElementById("setup-box").style.display = "block";
        document.getElementById("quiz-box").style.display = "none";
        document.getElementById("score-box").style.display = "none";
        document.getElementById("progress").innerText = "ตั้งค่าระบบควิซของคุณ";
    }

    document.getElementById("user-answer").addEventListener("keyup", function(event) {
        if (event.key === "Enter") {
            if(currentIndex < totalQuestions || !isShowingAnswer) {
                checkAnswer();
            }
        }
    });

    // เริ่มสร้าง Dropdown เมื่อโหลดเพจเสร็จ
    initSetupOptions();
</script>

</body>
</html>
