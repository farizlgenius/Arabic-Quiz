<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arabic Quiz App (51-75) No-Repeat</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-content: center;
            min-height: 100vh;
        }
        .quiz-container {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 550px;
            width: 100%;
            text-align: center;
            margin: auto;
        }
        h2 { color: #2c3e50; margin-bottom: 5px; font-size: 24px; }
        .progress { color: #7f8c8d; font-size: 14px; margin-bottom: 25px; }
        .question-box {
            background-color: #fdfaf6;
            padding: 25px;
            border-radius: 10px;
            margin-bottom: 20px;
            border-left: 5px solid #9b59b6;
        }
        .type-label { font-size: 14px; color: #8e44ad; font-weight: bold; text-transform: uppercase; margin-bottom: 10px; }
        .word { font-size: 36px; font-weight: bold; margin: 15px 0; color: #2c3e50; direction: rtl; }
        
        .verb-table {
            width: 100%;
            margin: 15px 0;
            border-collapse: collapse;
            direction: rtl;
        }
        .verb-table th, .verb-table td {
            border: 1px solid #e0e0e0;
            padding: 10px;
            text-align: center;
            font-size: 20px;
        }
        .verb-table th {
            background-color: #f1f2f6;
            font-size: 14px;
            color: #57606f;
            font-weight: bold;
        }
        .th-label {
            font-size: 12px;
            color: #7f8c8d;
            display: block;
            margin-top: 2px;
        }

        .input-answer {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 2px solid #bdc3c7;
            border-radius: 8px;
            box-sizing: border-box;
            margin-bottom: 15px;
            text-align: center;
        }
        .btn {
            background-color: #9b59b6;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: background 0.2s;
        }
        .btn:hover { background-color: #8e44ad; }
        .btn-secondary { background-color: #3498db; margin-top: 10px; }
        .btn-secondary:hover { background-color: #2980b9; }
        .result {
            margin-top: 20px;
            padding: 20px;
            border-radius: 8px;
            font-weight: bold;
            display: none;
            text-align: center;
        }
        .correct { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .wrong { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .score-view { font-size: 26px; color: #2c3e50; font-weight: bold; }
    </style>
</head>
<body>

<div class="quiz-container">
    <h2>Arabic Quiz (คำที่ 51-75)</h2>
    <div class="progress" id="progress">ข้อที่ 1/25</div>

    <div id="quiz-box">
        <div class="question-box">
            <div class="type-label" id="direction-label">แปลเป็นภาษาไทย</div>
            <div id="question-display"></div>
        </div>
        <input type="text" id="user-answer" class="input-answer" placeholder="พิมพ์คำตอบที่นี่ แล้วกด Enter" autocomplete="off">
        <button class="btn" id="action-btn" onclick="checkAnswer()">ตรวจคำตอบ</button>
        <div class="result" id="result-box"></div>
    </div>

    <div id="score-box" style="display: none;">
        <p class="score-view" id="final-score">คุณได้คะแนน 0/25</p>
        <button class="btn btn-secondary" onclick="restartQuiz()">เริ่มเล่นใหม่อีกรอบ</button>
    </div>
</div>

<script>
    // ข้อมูลตารางคำศัพท์ลำดับที่ 51-75 ดึงตรงตามรูปภาพจริงที่ส่งมาล่าสุด
    const vocabData = [
        { id: 51, past: "لَمَسَ", present: "يَلْمِسُ", masdar: "لَمْسٌ", th: "สัมผัส, แตะ" },
        { id: 52, past: "حَفِظَ", present: "يَحْفَظُ", masdar: "حِفْظٌ", th: "ท่องจำ, รักษา" },
        { id: 53, past: "نَسِيَ", present: "يَنْسَى", masdar: "نِسْيَانٌ", th: "ลืม" },
        { id: 54, past: "خَدَمَ", present: "يَخْدُمُ", masdar: "خِدْمَةٌ", th: "รับใช้/บริการ" },
        { id: 55, past: "زَارَ", present: "يَزُورُ", masdar: "زِيَارَةٌ", th: "เยี่ยมเยียน" },
        { id: 56, past: "مَرِضَ", present: "يَمْرَضُ", masdar: "مَرَضٌ", th: "เจ็บป่วย" },
        { id: 57, past: "سَعَلَ", present: "يَسْعُلُ", masdar: "سُعَالٌ", th: "ไอ" },
        { id: 58, past: "عَطَسَ", present: "يَعْطِسُ", masdar: "عَطْسٌ", th: "จาม" },
        { id: 59, past: "قَتَلَ", present: "يَقْتُلُ", masdar: "قَتْلٌ", th: "ฆ่า" },
        { id: 60, past: "مَاتَ", present: "يَمُوتُ", masdar: "مَوْتٌ", th: "ตาย" },
        { id: 61, past: "قَالَ", present: "يَقُولُ", masdar: "قَوْلٌ", th: "กล่าว" },
        { id: 62, past: "نَصَحَ", present: "يَنْصَحُ", masdar: "نُصْحٌ", th: "ตักเตือน" },
        { id: 63, past: "عَدَّ", present: "يَعُدُّ", masdar: "عَدٌّ", th: "นับ" },
        { id: 64, past: "دَرَسَ", present: "يَدْرُسُ", masdar: "دِرَاسَةٌ", th: "เรียน" },
        { id: 65, past: "دَعَا", present: "يَدْعُو", masdar: "دَعْوَةٌ", th: "เชิญชวน" },
        { id: 66, past: "قَصَّ", present: "يَقُصُّ", masdar: "قَصٌّ", th: "เล่า, ตัด" },
        { id: 67, past: "حَكَى", present: "يَحْكِي", masdar: "حِكَايَةٌ", th: "เล่า" },
        { id: 68, past: "كَذَبَ", present: "يَكْذِبُ", masdar: "كَذِبٌ", th: "โกหก" },
        { id: 69, past: "خَدَعَ", present: "يَخْدَعُ", masdar: "خَدْعٌ", th: "หลอกลวง" },
        { id: 70, past: "صَانَ", present: "يَصُونُ", masdar: "صِيَانَةٌ", th: "รักษา" },
        { id: 71, past: "دَخَلَ", present: "يَدْخُلُ", masdar: "دُخُولٌ", th: "เข้า" },
        { id: 72, past: "خَرَجَ", present: "يَخْرُجُ", masdar: "خُرُوجٌ", th: "ออก" },
        { id: 73, past: "ضَحِكَ", present: "يَضْحَكُ", masdar: "ضَحِكٌ", th: "หัวเราะ" },
        { id: 74, past: "بَكَى", present: "يَبْكِي", masdar: "بُكَاءٌ", th: "ร้องให้" },
        { id: 75, past: "غَضِبَ", present: "يَغْضَبُ", masdar: "غَضَبٌ", th: "โกรธ" }
    ];

    let currentQuestions = [];
    let currentIndex = 0;
    let score = 0;
    let isShowingAnswer = false;
    const totalQuestions = 13; 

    function startQuiz() { // Take only the first 13 words (ID 51-63) 
        let first13Words = vocabData.slice(0, 13); // Shuffle them 
        let shuffled = [...first13Words].sort(() => 0.5 - Math.random()); 
        currentQuestions = shuffled.map(item => { 
            let isArToTh = Math.random() > 0.5; 
            return { 
                rawData: item, 
                isArToTh: isArToTh, 
                type: isArToTh ? 
                    "แปลกลุ่มคำอาหรับนี้เป็นภาษาไทย" 
                    : "พิมพ์คำกริยาช่องอดีต (ช่องที่ 1) ให้ตรงกับความหมาย" 
            }; 
        }); 
        
        currentIndex = 0; 
        score = 0; 
        isShowingAnswer = false; 
        showQuestion(); 
    }

    function generateArabicTableHTML(past, present, masdar) {
        return `
            <table class="verb-table">
                <thead>
                    <tr>
                        <th>อดีต <span class="th-label">(مَاضٍ)</span></th>
                        <th>ปัจจุบัน <span class="th-label">(مُضَارِع)</span></th>
                        <th>อาการนาม <span class="th-label">(مَصْدَر)</span></th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>${past}</td>
                        <td>${present}</td>
                        <td>${masdar}</td>
                    </tr>
                </tbody>
            </table>
        `;
    }

    function showQuestion() {
        if (currentIndex < totalQuestions) {
            document.getElementById("quiz-box").style.display = "block";
            document.getElementById("score-box").style.display = "none";
            document.getElementById("progress").innerText = `ข้อที่ ${currentIndex + 1}/${totalQuestions}`;
            
            let q = currentQuestions[currentIndex];
            document.getElementById("direction-label").innerText = q.type;
            
            let displayBox = document.getElementById("question-display");
            if (q.isArToTh) {
                displayBox.innerHTML = generateArabicTableHTML(q.rawData.past, q.rawData.present, q.rawData.masdar);
            } else {
                displayBox.innerHTML = `<div class="word" style="direction: ltr;">"${q.rawData.th}"</div>`;
            }

            document.getElementById("user-answer").value = "";
            document.getElementById("user-answer").disabled = false;
            document.getElementById("result-box").style.display = "none";
            document.getElementById("action-btn").innerText = "ตรวจคำตอบ";
            document.getElementById("user-answer").focus();
            isShowingAnswer = false;
        } else {
            document.getElementById("quiz-box").style.display = "none";
            document.getElementById("score-box").style.display = "block";
            document.getElementById("progress").innerText = "จบชุดควิซเรียบร้อยแล้ว!";
            document.getElementById("final-score").innerText = `คุณทำคะแนนได้ทั้งหมด ${score}/${totalQuestions}`;
        }
    }

    function checkAnswer() {
        let q = currentQuestions[currentIndex];
        let resultBox = document.getElementById("result-box");
        let actionBtn = document.getElementById("action-btn");
        let userAns = document.getElementById("user-answer").value.trim();

        if (!isShowingAnswer) {
            let isCorrect = false;
            let targetAnswer = "";

            if (q.isArToTh) {
                targetAnswer = q.rawData.th;
                isCorrect = targetAnswer.includes(userAns) && userAns !== "";
            } else {
                targetAnswer = q.rawData.past;
                let cleanUserAns = userAns.replace(/[\u064B-\u0652]/g, "");
                let cleanTarget = targetAnswer.replace(/[\u064B-\u0652]/g, "");
                isCorrect = (cleanUserAns === cleanTarget && userAns !== "");
            }
            
            if (isCorrect) {
                resultBox.className = "result correct";
                resultBox.innerHTML = `🎉 ถูกต้องแม่นยำ!`;
                score++;
            } else {
                resultBox.className = "result wrong";
                resultBox.innerHTML = `สู้ ๆ ท่องบ่อย ๆ เดี่ยวก็จำได้ครับ!`;
            }

            resultBox.innerHTML += `
                <div style="margin-top: 15px; text-align: left; direction: ltr; font-size:15px; line-height:1.6;">
                    <strong>ความหมายภาษาไทย:</strong> ${q.rawData.th}<br>
                    <strong>เฉลยและตารางคำศัพท์:</strong>
                </div>
                ${generateArabicTableHTML(q.rawData.past, q.rawData.present, q.rawData.masdar)}
            `;

            resultBox.style.display = "block";
            document.getElementById("user-answer").disabled = true;
            actionBtn.innerText = "ทำข้อถัดไป ->";
            actionBtn.focus();
            isShowingAnswer = true;
        } else {
            currentIndex++;
            showQuestion();
        }
    }

    function restartQuiz() {
        startQuiz();
    }

    document.getElementById("user-answer").addEventListener("keyup", function(event) {
        if (event.key === "Enter") {
            checkAnswer();
        }
    });

    startQuiz();
</script>

</body>
</html>
